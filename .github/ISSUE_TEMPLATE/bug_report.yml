name: Bug report
description: Report a defect in the claude-subscription provider.
title: "bug: <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Do not include OAuth tokens, API keys, `.credentials.json` contents,
        or `Authorization` / `Bearer` headers in this report.** If you must
        share request/response data, redact secrets first.

        For security vulnerabilities, do **not** open a public issue — see
        [SECURITY.md](../../blob/main/SECURITY.md) instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code that trigger the bug.
      placeholder: |
        1. `pi --model claude-subscription/claude-sonnet-4-6`
        2. ...
        3. Observe: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or relevant log lines (with secrets redacted).
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse HEAD` in your checkout, or the installed tag.
      placeholder: e.g. 41a4e1e or v0.1.0
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v22.11.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows / WSL
        - Other
    validations:
      required: true

  - type: dropdown
    id: credential-source
    attributes:
      label: Credential source
      description: Where Claude Code OAuth credentials are loaded from on this machine.
      options:
        - "`.credentials.json` file"
        - macOS Keychain
        - Unsure
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else relevant — environment vars set, network setup, related issues.

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have removed all OAuth tokens, API keys, and credential contents from this report.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
