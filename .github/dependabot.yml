# Dependabot keeps dependencies up to date by opening pull requests when new
# versions are released. Free for all repositories. Docs:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Update npm dependencies (devDependencies / peerDependencies in package.json).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      include: scope
    # Group all non-major updates into one PR per week to reduce noise.
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # peerDependency: pinned to "*" intentionally; updating doesn't help.
      - dependency-name: "@earendil-works/pi-coding-agent"
      # Match the Node typings to engines.node >=22.19.0: allow 22.19.x
      # patch updates, but do not let Dependabot widen to newer Node minors
      # or majors where TypeScript could accept APIs missing from the runtime
      # floor.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  # Update versions of GitHub Actions used in workflows (uses: actions/...@vN).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
